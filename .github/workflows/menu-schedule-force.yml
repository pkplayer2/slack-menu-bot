name: Slack Menu Bot (Schedule Force)

permissions:
  contents: write

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 (테스트용)
  workflow_dispatch:

jobs:
  send-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run menu bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python menu_bot.py
